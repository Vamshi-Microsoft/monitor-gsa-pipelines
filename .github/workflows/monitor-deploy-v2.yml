name: Monitor Deploy-v2 Pipelines

on:
  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      main_branch_only:
        description: 'Fetch only runs from main branch'
        required: false
        default: false
        type: boolean
      trigger_filter:
        description: 'Filter by trigger type'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - schedule
          - workflow_dispatch
          - push
          - pull_request

permissions:
  contents: read
  actions: read

jobs:
  monitor:
    name: Monitor deploy-v2 across repos
    runs-on: ubuntu-latest
    env:
      MAIN_BRANCH_ONLY: ${{ github.event.inputs.main_branch_only || 'false' }}
      TRIGGER_FILTER: ${{ github.event.inputs.trigger_filter || 'all' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Collect deploy-v2 pipeline status
        id: collect
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PIPELINE_MONITOR_PAT }}
          script: |
            const repos = [
              { owner: 'microsoft', repo: 'content-generation-solution-accelerator' },
              { owner: 'microsoft', repo: 'Multi-Agent-Custom-Automation-Engine-Solution-Accelerator' },
              { owner: 'microsoft', repo: 'customer-chatbot-solution-accelerator' },
              { owner: 'microsoft', repo: 'Container-Migration-Solution-Accelerator' },
              { owner: 'microsoft', repo: 'content-processing-solution-accelerator' },
              { owner: 'microsoft', repo: 'Conversation-Knowledge-Mining-Solution-Accelerator' },
              { owner: 'microsoft', repo: 'Document-Knowledge-Mining-Solution-Accelerator' },
              { owner: 'microsoft', repo: 'Modernize-your-code-solution-accelerator' },
              { owner: 'microsoft', repo: 'agentic-applications-for-unified-data-foundation-solution-accelerator' }
            ];

            const results = [];

            const branchFilter = process.env.MAIN_BRANCH_ONLY === 'true' ? 'main' : '';
            const triggerFilter = (process.env.TRIGGER_FILTER || 'all').trim();

            for (const { owner, repo } of repos) {
              const entry = {
                owner,
                repo,
                fullName: `${owner}/${repo}`,
                repoUrl: `https://github.com/${owner}/${repo}`,
                status: 'unknown',
                conclusion: null,
                runUrl: null,
                runId: null,
                branch: null,
                event: null,
                startedAt: null,
                failedJobs: [],
                workflowFound: false,
                error: null
              };

              try {
                // Look up deploy-v2.yml directly by filename — exactly like visiting
                // https://github.com/{owner}/{repo}/actions/workflows/deploy-v2.yml
                const listParams = {
                  owner,
                  repo,
                  workflow_id: 'deploy-v2.yml',
                  per_page: 1
                };
                if (branchFilter) listParams.branch = branchFilter;
                if (triggerFilter && triggerFilter !== 'all') listParams.event = triggerFilter;

                const { data: runs } = await github.rest.actions.listWorkflowRuns(listParams);

                if (runs.workflow_runs.length === 0) {
                  entry.status = 'no_recent_runs';
                  entry.error = 'No workflow runs found';
                  results.push(entry);
                  continue;
                }

                entry.workflowFound = true;

                // The API returns the latest run first — this is the top entry in the UI
                const latestRun = runs.workflow_runs[0];

                entry.status = latestRun.status;
                entry.conclusion = latestRun.conclusion;
                entry.runUrl = latestRun.html_url;
                entry.runId = latestRun.id;
                entry.branch = latestRun.head_branch;
                entry.event = latestRun.event;
                entry.startedAt = latestRun.created_at;

                // If the run failed or has completed, get job details
                if (latestRun.status === 'completed') {
                  const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
                    owner,
                    repo,
                    run_id: latestRun.id,
                    per_page: 100
                  });

                  entry.failedJobs = jobs.jobs
                    .filter(j => j.conclusion === 'failure' || j.conclusion === 'cancelled')
                    .map(j => ({
                      name: j.name,
                      conclusion: j.conclusion,
                      url: j.html_url,
                      failedSteps: j.steps
                        ? j.steps
                            .filter(s => s.conclusion === 'failure')
                            .map(s => s.name)
                        : []
                    }));
                }
              } catch (err) {
                entry.error = err.message || 'API error';
              }

              results.push(entry);
            }

            // Store results as output
            const fs = require('fs');
            fs.writeFileSync('pipeline-results.json', JSON.stringify(results, null, 2));

            // Compute summary stats
            const totalRepos = results.length;
            const successful = results.filter(r => r.conclusion === 'success').length;
            const failed = results.filter(r => r.conclusion === 'failure').length;
            const inProgress = results.filter(r => r.status === 'in_progress' || r.status === 'queued').length;
            const cancelled = results.filter(r => r.conclusion === 'cancelled').length;
            const noRuns = results.filter(r => r.status === 'no_recent_runs' || !r.workflowFound).length;

            core.setOutput('total', totalRepos);
            core.setOutput('successful', successful);
            core.setOutput('failed', failed);
            core.setOutput('in_progress', inProgress);
            core.setOutput('cancelled', cancelled);
            core.setOutput('no_runs', noRuns);
            core.setOutput('results_json', JSON.stringify(results));

      - name: Generate GitHub Summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('pipeline-results.json', 'utf8'));

            const successful = results.filter(r => r.conclusion === 'success').length;
            const failed = results.filter(r => r.conclusion === 'failure').length;
            const inProgress = results.filter(r => r.status === 'in_progress' || r.status === 'queued').length;
            const cancelled = results.filter(r => r.conclusion === 'cancelled').length;
            const noRuns = results.filter(r => r.status === 'no_recent_runs' || !r.workflowFound).length;
            const totalRepos = results.length;

            const statusIcon = (r) => {
              if (r.conclusion === 'success') return '🟢';
              if (r.conclusion === 'failure') return '🔴';
              if (r.conclusion === 'cancelled') return '🟡';
              if (r.status === 'in_progress') return '🔵';
              if (r.status === 'queued') return '⚪';
              return '⚫';
            };

            const conclusionBadge = (r) => {
              if (r.conclusion === 'success') return '`✅ Success`';
              if (r.conclusion === 'failure') return '`❌ Failed`';
              if (r.conclusion === 'cancelled') return '`⚠️ Cancelled`';
              if (r.status === 'in_progress') return '`🔄 In Progress`';
              if (r.status === 'queued') return '`⏳ Queued`';
              if (!r.workflowFound) return '`➖ Not Found`';
              if (r.status === 'no_recent_runs') return '`💤 No Runs`';
              return '`❓ Unknown`';
            };

            let summary = '';

            // Header
            summary += `# 📊 Deploy-v2 Pipeline Monitor\n\n`;
            summary += `> **Report generated:** ${new Date().toUTCString()}  \n\n`;

            // Stats cards
            summary += `## Summary\n\n`;
            summary += `| Total | ✅ Success | ❌ Failed | 🔄 In Progress | ⚠️ Cancelled | 💤 No Runs |\n`;
            summary += `|:-----:|:----------:|:---------:|:---------------:|:-------------:|:-----------:|\n`;
            summary += `| **${totalRepos}** | **${successful}** | **${failed}** | **${inProgress}** | **${cancelled}** | **${noRuns}** |\n\n`;

            // Overall health
            if (failed === 0 && cancelled === 0) {
              summary += `> **🎉 All pipelines healthy!**\n\n`;
            } else if (failed > 0) {
              summary += `> **🚨 ${failed} pipeline(s) require attention!**\n\n`;
            }

            // Detailed table — grouped by status
            const statusOrder = (r) => {
              if (r.conclusion === 'failure') return 0;
              if (r.conclusion === 'cancelled') return 1;
              if (r.status === 'in_progress' || r.status === 'queued') return 2;
              if (r.conclusion === 'success') return 3;
              return 4;
            };
            const grouped = [...results].sort((a, b) => statusOrder(a) - statusOrder(b));

            summary += `## Pipeline Details\n\n`;
            summary += `| Status | Repository | Conclusion | Branch | Trigger | Triggered At | Run |\n`;
            summary += `|:------:|:-----------|:-----------|:-------|:--------|:-------------|:----|\n`;

            for (const r of grouped) {
              const repoLink = `[${r.repo}](${r.repoUrl}/actions/workflows/deploy-v2.yml)`;
              const runLink = r.runUrl ? `[View](${r.runUrl})` : '—';
              const branch = r.branch || '—';
              const trigger = r.event || '—';
              const triggeredAt = r.startedAt ? new Date(r.startedAt).toUTCString() : '—';
              summary += `| ${statusIcon(r)} | ${repoLink} | ${conclusionBadge(r)} | \`${branch}\` | \`${trigger}\` | ${triggeredAt} | ${runLink} |\n`;
            }

            summary += '\n';

            // Failed Jobs Breakdown
            const failedRepos = results.filter(r => r.failedJobs && r.failedJobs.length > 0);
            if (failedRepos.length > 0) {
              summary += `## ❌ Failed Jobs Breakdown\n\n`;

              for (const r of failedRepos) {
                summary += `### 🔴 ${r.repo}\n\n`;
                summary += `| Job | Status | Failed Steps | Link |\n`;
                summary += `|:----|:-------|:-------------|:-----|\n`;

                for (const job of r.failedJobs) {
                  const stepsStr = job.failedSteps.length > 0
                    ? job.failedSteps.map(s => `\`${s}\``).join(', ')
                    : '—';
                  const jobLink = job.url ? `[View](${job.url})` : '—';
                  const jobConclusion = job.conclusion === 'failure' ? '`❌ Failed`' : '`⚠️ Cancelled`';
                  summary += `| ${job.name} | ${jobConclusion} | ${stepsStr} | ${jobLink} |\n`;
                }
                summary += '\n';
              }
            }

            // No workflow / No runs
            const issueRepos = results.filter(r => !r.workflowFound || r.status === 'no_recent_runs');
            if (issueRepos.length > 0) {
              summary += `## ℹ️ Repos Without Recent Runs\n\n`;
              for (const r of issueRepos) {
                const reason = r.error || 'Unknown';
                summary += `- **${r.repo}**: ${reason}\n`;
              }
              summary += '\n';
            }

            summary += `---\n`;
            summary += `*🤖 Automated by [Monitor Deploy-v2 Pipelines](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})*\n`;

            await core.summary.addRaw(summary).write();

      - name: Generate Email HTML
        id: email
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('pipeline-results.json', 'utf8'));

            const successful = results.filter(r => r.conclusion === 'success').length;
            const failed = results.filter(r => r.conclusion === 'failure').length;
            const inProgress = results.filter(r => r.status === 'in_progress' || r.status === 'queued').length;
            const cancelled = results.filter(r => r.conclusion === 'cancelled').length;
            const noRuns = results.filter(r => r.status === 'no_recent_runs' || !r.workflowFound).length;
            const totalRepos = results.length;

            const statusColor = (r) => {
              if (r.conclusion === 'success') return '#22c55e';
              if (r.conclusion === 'failure') return '#ef4444';
              if (r.conclusion === 'cancelled') return '#f59e0b';
              if (r.status === 'in_progress') return '#3b82f6';
              return '#6b7280';
            };

            const statusLabel = (r) => {
              if (r.conclusion === 'success') return '✅ Success';
              if (r.conclusion === 'failure') return '❌ Failed';
              if (r.conclusion === 'cancelled') return '⚠️ Cancelled';
              if (r.status === 'in_progress') return '🔄 In Progress';
              if (r.status === 'queued') return '⏳ Queued';
              if (!r.workflowFound) return '➖ Not Found';
              if (r.status === 'no_recent_runs') return '💤 No Runs';
              return '❓ Unknown';
            };

            const overallStatus = failed > 0 ? 'ACTION REQUIRED' : 'ALL HEALTHY';
            const headerBg = failed > 0 ? '#dc2626' : '#16a34a';

            let html = `
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
            </head>
            <body style="margin:0; padding:0; background-color:#f1f5f9; font-family:'Segoe UI',Roboto,Arial,sans-serif;">
              <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f1f5f9; padding:32px 0;">
                <tr>
                  <td align="center">
                    <table width="680" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,0.08);">

                      <!-- Header -->
                      <tr>
                        <td style="background: linear-gradient(135deg, ${headerBg}, ${failed > 0 ? '#991b1b' : '#15803d'}); padding:32px 40px; text-align:center;">
                          <h1 style="color:#ffffff; margin:0; font-size:28px; font-weight:700; letter-spacing:-0.5px;">
                            📊 Deploy-v2 Pipeline Monitor
                          </h1>
                          <p style="color:rgba(255,255,255,0.85); margin:8px 0 0; font-size:14px;">
                            ${new Date().toUTCString()}
                          </p>
                        </td>
                      </tr>

                      <!-- Status Banner -->
                      <tr>
                        <td style="padding:24px 40px 0;">
                          <table width="100%" cellpadding="0" cellspacing="0" style="background-color:${failed > 0 ? '#fef2f2' : '#f0fdf4'}; border-radius:8px; border:1px solid ${failed > 0 ? '#fecaca' : '#bbf7d0'};">
                            <tr>
                              <td style="padding:16px 20px; text-align:center;">
                                <span style="font-size:24px; font-weight:700; color:${failed > 0 ? '#dc2626' : '#16a34a'};">
                                  ${failed > 0 ? '🚨' : '🎉'} ${overallStatus}
                                </span>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>

                      <!-- Summary Stats -->
                      <tr>
                        <td style="padding:24px 40px;">
                          <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                              <td width="20%" align="center" style="padding:12px 4px;">
                                <div style="background:#f8fafc; border-radius:8px; padding:16px 8px; border:1px solid #e2e8f0;">
                                  <div style="font-size:28px; font-weight:700; color:#0f172a;">${totalRepos}</div>
                                  <div style="font-size:11px; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; margin-top:4px;">Total</div>
                                </div>
                              </td>
                              <td width="20%" align="center" style="padding:12px 4px;">
                                <div style="background:#f0fdf4; border-radius:8px; padding:16px 8px; border:1px solid #bbf7d0;">
                                  <div style="font-size:28px; font-weight:700; color:#16a34a;">${successful}</div>
                                  <div style="font-size:11px; color:#16a34a; text-transform:uppercase; letter-spacing:0.5px; margin-top:4px;">Passed</div>
                                </div>
                              </td>
                              <td width="20%" align="center" style="padding:12px 4px;">
                                <div style="background:#fef2f2; border-radius:8px; padding:16px 8px; border:1px solid #fecaca;">
                                  <div style="font-size:28px; font-weight:700; color:#dc2626;">${failed}</div>
                                  <div style="font-size:11px; color:#dc2626; text-transform:uppercase; letter-spacing:0.5px; margin-top:4px;">Failed</div>
                                </div>
                              </td>
                              <td width="20%" align="center" style="padding:12px 4px;">
                                <div style="background:#fffbeb; border-radius:8px; padding:16px 8px; border:1px solid #fde68a;">
                                  <div style="font-size:28px; font-weight:700; color:#d97706;">${cancelled}</div>
                                  <div style="font-size:11px; color:#d97706; text-transform:uppercase; letter-spacing:0.5px; margin-top:4px;">Cancelled</div>
                                </div>
                              </td>
                              <td width="20%" align="center" style="padding:12px 4px;">
                                <div style="background:#f8fafc; border-radius:8px; padding:16px 8px; border:1px solid #e2e8f0;">
                                  <div style="font-size:28px; font-weight:700; color:#6b7280;">${noRuns}</div>
                                  <div style="font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:0.5px; margin-top:4px;">No Runs</div>
                                </div>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>

                      <!-- Pipeline Details -->
                      <tr>
                        <td style="padding:0 40px 24px;">
                          <h2 style="font-size:18px; color:#0f172a; margin:0 0 16px; font-weight:600;">Pipeline Status</h2>
                          <table width="100%" cellpadding="0" cellspacing="0" style="border-radius:8px; overflow:hidden; border:1px solid #e2e8f0;">
                            <tr style="background-color:#f8fafc;">
                              <th style="padding:12px 16px; text-align:left; font-size:12px; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; border-bottom:2px solid #e2e8f0;">Status</th>
                              <th style="padding:12px 16px; text-align:left; font-size:12px; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; border-bottom:2px solid #e2e8f0;">Repository</th>
                              <th style="padding:12px 16px; text-align:left; font-size:12px; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; border-bottom:2px solid #e2e8f0;">Branch</th>
                              <th style="padding:12px 16px; text-align:left; font-size:12px; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; border-bottom:2px solid #e2e8f0;">Triggered At</th>
                              <th style="padding:12px 16px; text-align:center; font-size:12px; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; border-bottom:2px solid #e2e8f0;">Link</th>
                            </tr>`;

            // Group by status: failed first, then cancelled, in-progress, success, others
            const statusOrder = (r) => {
              if (r.conclusion === 'failure') return 0;
              if (r.conclusion === 'cancelled') return 1;
              if (r.status === 'in_progress' || r.status === 'queued') return 2;
              if (r.conclusion === 'success') return 3;
              return 4;
            };
            const grouped = [...results].sort((a, b) => statusOrder(a) - statusOrder(b));

            grouped.forEach((r, i) => {
              const bgColor = i % 2 === 0 ? '#ffffff' : '#f8fafc';
              const link = r.runUrl
                ? `<a href="${r.runUrl}" style="color:#3b82f6; text-decoration:none; font-weight:500;">View Run \u2192</a>`
                : '\u2014';
              html += `
                            <tr style="background-color:${bgColor};">
                              <td style="padding:14px 16px; border-bottom:1px solid #f1f5f9;">
                                <span style="display:inline-block; padding:4px 10px; border-radius:12px; font-size:12px; font-weight:600; background-color:${statusColor(r)}20; color:${statusColor(r)};">
                                  ${statusLabel(r)}
                                </span>
                              </td>
                              <td style="padding:14px 16px; border-bottom:1px solid #f1f5f9;">
                                <a href="${r.repoUrl}/actions/workflows/deploy-v2.yml" style="color:#0f172a; text-decoration:none; font-weight:500;">${r.repo}</a>
                              </td>
                              <td style="padding:14px 16px; border-bottom:1px solid #f1f5f9; color:#475569; font-size:13px;">
                                <code style="background:#f1f5f9; padding:2px 6px; border-radius:4px; font-size:12px;">${r.branch || '—'}</code>
                              </td>
                              <td style="padding:14px 16px; border-bottom:1px solid #f1f5f9; color:#475569; font-size:13px;">${r.startedAt ? new Date(r.startedAt).toUTCString() : '—'}</td>
                              <td style="padding:14px 16px; border-bottom:1px solid #f1f5f9; text-align:center;">${link}</td>
                            </tr>`;
            });

            html += `
                          </table>
                        </td>
                      </tr>`;

            // Failed jobs section
            const failedRepos = results.filter(r => r.failedJobs && r.failedJobs.length > 0);
            if (failedRepos.length > 0) {
              html += `
                      <tr>
                        <td style="padding:0 40px 24px;">
                          <h2 style="font-size:18px; color:#dc2626; margin:0 0 16px; font-weight:600;">❌ Failed Jobs Details</h2>`;

              for (const r of failedRepos) {
                html += `
                          <div style="background:#fef2f2; border:1px solid #fecaca; border-radius:8px; padding:16px; margin-bottom:16px;">
                            <h3 style="margin:0 0 12px; font-size:15px; color:#991b1b;">
                              🔴 ${r.repo}
                            </h3>
                            <table width="100%" cellpadding="0" cellspacing="0" style="border-radius:6px; overflow:hidden; background:#ffffff;">
                              <tr style="background:#fef2f2;">
                                <th style="padding:10px 12px; text-align:left; font-size:11px; color:#991b1b; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid #fecaca;">Job Name</th>
                                <th style="padding:10px 12px; text-align:left; font-size:11px; color:#991b1b; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid #fecaca;">Status</th>
                                <th style="padding:10px 12px; text-align:left; font-size:11px; color:#991b1b; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid #fecaca;">Failed Steps</th>
                              </tr>`;

                for (const job of r.failedJobs) {
                  const stepsStr = job.failedSteps.length > 0
                    ? job.failedSteps.join(', ')
                    : '—';
                  html += `
                              <tr>
                                <td style="padding:10px 12px; border-bottom:1px solid #fef2f2; font-size:13px; font-weight:500;">
                                  ${job.url ? `<a href="${job.url}" style="color:#dc2626; text-decoration:none;">${job.name}</a>` : job.name}
                                </td>
                                <td style="padding:10px 12px; border-bottom:1px solid #fef2f2; font-size:13px; color:#dc2626;">${job.conclusion === 'failure' ? '❌ Failed' : '⚠️ Cancelled'}</td>
                                <td style="padding:10px 12px; border-bottom:1px solid #fef2f2; font-size:13px; color:#64748b;">${stepsStr}</td>
                              </tr>`;
                }

                html += `
                            </table>
                          </div>`;
              }

              html += `
                        </td>
                      </tr>`;
            }

            html += `
                      <!-- Footer -->
                      <tr>
                        <td style="background:#f8fafc; padding:20px 40px; text-align:center; border-top:1px solid #e2e8f0;">
                          <p style="margin:0; font-size:13px; color:#94a3b8;">
                            🤖 Automated Pipeline Monitor ·
                            <a href="${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}" style="color:#3b82f6; text-decoration:none;">View Workflow Run</a>
                          </p>
                        </td>
                      </tr>

                    </table>
                  </td>
                </tr>
              </table>
            </body>
            </html>`;

            fs.writeFileSync('email-report.html', html);

            // Set subject line
            const subject = failed > 0
              ? `🚨 Deploy-v2 Monitor: ${failed} pipeline(s) FAILED — ${new Date().toLocaleDateString()}`
              : `✅ Deploy-v2 Monitor: All pipelines healthy — ${new Date().toLocaleDateString()}`;
            core.setOutput('subject', subject);

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-monitor-report
          path: |
            pipeline-results.json
            email-report.html
          retention-days: 30

      - name: Send email notification via Logic App
        shell: bash
        env:
          LOGICAPP_URL: ${{ secrets.EMAILNOTIFICATION_LOGICAPP_URL_TA }}
          EMAIL_SUBJECT: ${{ steps.email.outputs.subject }}
        run: |
          EMAIL_HTML=$(cat email-report.html | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          
          EMAIL_BODY=$(cat <<EOF
          {
            "body": ${EMAIL_HTML},
            "subject": "${EMAIL_SUBJECT}"
          }
          EOF
          )
          
          curl -X POST "${LOGICAPP_URL}" \
            -H "Content-Type: application/json" \
            -d "$EMAIL_BODY" || echo "Failed to send pipeline monitor notification"