name: Monitor Forked Repos for Scheduled Workflows

on:
  schedule:
    - cron: '0 3 * * *' # Daily at 3:00 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  scan:
    name: Scan forked repos for schedule triggers
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PIPELINE_MONITOR_PAT }}
    steps:
      - name: Validate inputs
        run: |
          if [[ -z "${{ vars.FORK_OWNERS }}" ]]; then
            echo "::error::Repository variable FORK_OWNERS is not set. Use format: email1 username1;email2 username2"
            exit 1
          fi

      - name: Scan forked repositories
        id: scan
        run: |
          set -euo pipefail

          USERNAMES="${{ vars.FORK_OWNERS }}"
          EXCLUDE_WORKFLOWS="${{ vars.EXCLUDE_WORKFLOWS }}"
          API_BASE="https://api.github.com"
          WARNINGS_FILE=$(mktemp)
          ERRORS_FILE=$(mktemp)
          TOTAL_REPOS=0

          # ── Parse excluded workflow filenames into an array ──
          declare -a EXCLUDED_FILES=()
          if [[ -n "$EXCLUDE_WORKFLOWS" ]]; then
            IFS=',' read -ra EXCLUDED_FILES <<< "$EXCLUDE_WORKFLOWS"
            # Trim whitespace from each entry
            for i in "${!EXCLUDED_FILES[@]}"; do
              EXCLUDED_FILES[$i]=$(echo "${EXCLUDED_FILES[$i]}" | xargs)
            done
            echo "Excluded workflows: ${EXCLUDED_FILES[*]}"
          fi

          # ── Helper: check if a workflow file is excluded ──
          is_excluded_workflow() {
            local file="$1"
            local basename="${file##*/}"
            local basename_lower="${basename,,}"
            for excluded in "${EXCLUDED_FILES[@]}"; do
              local excluded_lower="${excluded,,}"
              if [[ "$excluded_lower" == "$basename_lower" ]]; then
                return 0
              fi
            done
            return 1
          }
          TOTAL_FORKS=0

          # ── Target parent repos — only forks of these repos are scanned ──
          TARGET_REPOS=(
            "content-generation-solution-accelerator"
            "Multi-Agent-Custom-Automation-Engine-Solution-Accelerator"
            "customer-chatbot-solution-accelerator"
            "Container-Migration-Solution-Accelerator"
            "content-processing-solution-accelerator"
            "Conversation-Knowledge-Mining-Solution-Accelerator"
            "Document-Knowledge-Mining-Solution-Accelerator"
            "Modernize-your-code-solution-accelerator"
            "agentic-applications-for-unified-data-foundation-solution-accelerator"
            "chat-with-your-data-solution-accelerator"
            "Data-and-Agent-Governance-and-Security-Accelerator"
            "real-time-intelligence-operations-solution-accelerator"
            "Deploy-Your-AI-Application-In-Production"
            "unified-data-foundation-with-fabric-solution-accelerator"
          )

          # ── Helper: check if a value exists in TARGET_REPOS ──
          is_target_repo() {
            local name="$1"
            for target in "${TARGET_REPOS[@]}"; do
              if [[ "$target" == "$name" ]]; then
                return 0
              fi
            done
            return 1
          }

          # ── Helper: authenticated GET with error handling ──
          api_get() {
            local url="$1"
            local response http_code body

            response=$(curl -sS -w "\n%{http_code}" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$url" 2>&1) || {
              echo "::warning::curl failed for ${url}"
              return 1
            }

            http_code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')

            if [[ "$http_code" -lt 200 || "$http_code" -ge 300 ]]; then
              echo "::warning::HTTP ${http_code} from ${url}"
              return 1
            fi

            echo "$body"
          }

          # ── Helper: fetch all pages for a paginated endpoint ──
          fetch_all_pages() {
            local base_url="$1"
            local separator="?"
            [[ "$base_url" == *"?"* ]] && separator="&"

            local page=1
            local all_items="[]"

            while true; do
              local page_data
              page_data=$(api_get "${base_url}${separator}per_page=100&page=${page}") || break

              local count
              count=$(echo "$page_data" | jq 'if type == "array" then length else 0 end')

              if [[ "$count" -eq 0 ]]; then
                break
              fi

              all_items=$(jq -s 'add' <(echo "$all_items") <(echo "$page_data"))
              page=$((page + 1))

              if [[ "$count" -lt 100 ]]; then
                break
              fi
            done

            echo "$all_items"
          }

          # ── Parse user entries (format: email username;email username) ──
          IFS=';' read -ra USER_ENTRIES <<< "$USERNAMES"
          EMAIL_MAP_FILE=$(mktemp)

          declare -a USERS=()
          for entry in "${USER_ENTRIES[@]}"; do
            entry=$(echo "$entry" | xargs) # trim whitespace
            [[ -z "$entry" ]] && continue

            user_email=$(echo "$entry" | awk '{print $1}')
            username=$(echo "$entry" | awk '{print $2}')

            if [[ -z "$username" || -z "$user_email" ]]; then
              echo "::warning::Invalid entry '${entry}' — expected 'email username'. Skipping."
              continue
            fi

            USERS+=("$username")
            echo "${username}|${user_email}" >> "$EMAIL_MAP_FILE"
          done

          if [[ ${#USERS[@]} -eq 0 ]]; then
            echo "::error::No valid user entries found in FORK_OWNERS."
            exit 1
          fi

          echo "==========================================="
          echo " Fork Scheduled-Workflow Scanner"
          echo "==========================================="
          echo ""

          for username in "${USERS[@]}"; do
            if [[ -z "$username" ]]; then
              continue
            fi

            echo "───────────────────────────────────────────"
            echo "User: ${username}"
            echo "───────────────────────────────────────────"

            # ── Fetch all repos for this user ──
            repos_json=$(fetch_all_pages "${API_BASE}/users/${username}/repos") || {
              echo "  ⚠️  Failed to fetch repos for ${username}" | tee -a "$ERRORS_FILE"
              continue
            }

            total_count=$(echo "$repos_json" | jq 'length')
            fork_names=$(echo "$repos_json" | jq -r '.[] | select(.fork == true) | .full_name')
            fork_count=$(echo "$repos_json" | jq '[.[] | select(.fork == true)] | length')

            echo "  Repos: ${total_count} total, ${fork_count} forks"
            TOTAL_REPOS=$((TOTAL_REPOS + total_count))
            TOTAL_FORKS=$((TOTAL_FORKS + fork_count))

            if [[ "$fork_count" -eq 0 ]]; then
              echo "  No forks found — skipping."
              continue
            fi

            # ── Iterate over forked repos ──
            while IFS= read -r repo_full; do
              [[ -z "$repo_full" ]] && continue
              repo_name="${repo_full#*/}"

              echo "  📂 ${repo_full}"

              # ── Check if this fork's parent is in the target list ──
              repo_detail=$(api_get "${API_BASE}/repos/${repo_full}") || {
                echo "    ⚠️  Could not fetch repo details" | tee -a "$ERRORS_FILE"
                continue
              }

              parent_name=$(echo "$repo_detail" | jq -r '.parent.name // empty')
              parent_full=$(echo "$repo_detail" | jq -r '.parent.full_name // empty')

              if [[ -z "$parent_name" ]]; then
                echo "    ⏭️  No parent info — skipping"
                continue
              fi

              if ! is_target_repo "$parent_name"; then
                echo "    ⏭️  Parent '${parent_full}' is not a monitored repo — skipping"
                continue
              fi

              echo "    ✔️  Parent: ${parent_full}"

              # ── Check if Actions tab is enabled on this repo ──
              # If https://github.com/{owner}/{repo}/actions returns 404, Actions are disabled
              actions_tab_http=$(curl -sS -o /dev/null -w "%{http_code}" \
                -H "Authorization: token ${GH_TOKEN}" \
                "https://github.com/${repo_full}/actions" 2>/dev/null)

              if [[ "$actions_tab_http" != "200" ]]; then
                echo "    ℹ️  Actions tab disabled (HTTP ${actions_tab_http}) — skipping"
                continue
              fi

              # Fetch workflows for this repo
              wf_json=$(api_get "${API_BASE}/repos/${repo_full}/actions/workflows") || {
                echo "    ⚠️  Could not fetch workflows" | tee -a "$ERRORS_FILE"
                continue
              }

              wf_count=$(echo "$wf_json" | jq '.total_count // 0')
              if [[ "$wf_count" -eq 0 ]]; then
                echo "    No workflows"
                continue
              fi

              echo "    Workflows: ${wf_count}"

              # Check each workflow file for schedule trigger
              echo "$wf_json" | jq -r '.workflows[] | "\(.id)|\(.path)|\(.state)|\(.name)"' | \
              while IFS='|' read -r wf_id wf_path wf_state wf_name; do
                [[ -z "$wf_id" ]] && continue

                echo "    📄 Checking: ${wf_path##*/} (state: ${wf_state})"

                # Skip excluded workflow files
                if is_excluded_workflow "$wf_path"; then
                  echo "    ⏭️  ${wf_name} (${wf_path##*/}) is in exclude list — skipping"
                  continue
                fi

                # Fetch raw workflow YAML content
                file_content=$(curl -sS -w "\n%{http_code}" \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github.raw+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "${API_BASE}/repos/${repo_full}/contents/${wf_path}" 2>/dev/null)

                file_http=$(echo "$file_content" | tail -n1)
                file_body=$(echo "$file_content" | sed '$d')

                if [[ "$file_http" != "200" ]]; then
                  echo "    ⚠️  Could not read ${wf_path} (HTTP ${file_http})"
                  continue
                fi

                # Check for schedule trigger
                if echo "$file_body" | grep -qE '^\s*-?\s*schedule\s*:|^\s*schedule\s*:'; then
                  # Only report active workflows — skip disabled ones
                  if [[ "$wf_state" != "active" ]]; then
                    echo "    ℹ️  ${wf_name} has schedule but is already ${wf_state} — OK"
                    continue
                  fi

                  echo "    🚨 ACTIVE SCHEDULED WORKFLOW DETECTED"
                  echo "       Name:  ${wf_name}"
                  echo "       File:  ${wf_path}"
                  echo "       URL:   https://github.com/${repo_full}/actions/workflows/${wf_path##*/}"
                  echo "       🔗 Disable: https://github.com/${repo_full}/actions/workflows/${wf_path##*/}"

                  # Record warning (only active)
                  echo "${username}|${repo_full}|${wf_path}|${wf_state}|${wf_id}|${wf_name}" >> "$WARNINGS_FILE"
                fi
              done
            done <<< "$fork_names"
          done

          # ── Collect counts ──
          SCHEDULED_COUNT=0
          [[ -s "$WARNINGS_FILE" ]] && SCHEDULED_COUNT=$(wc -l < "$WARNINGS_FILE")

          # ── Console summary ──
          echo ""
          echo "==========================================="
          echo " SCAN SUMMARY"
          echo "==========================================="
          echo "  Users scanned:        ${#USERS[@]}"
          echo "  Total repos:          ${TOTAL_REPOS}"
          echo "  Forked repos:         ${TOTAL_FORKS}"
          echo "  Scheduled workflows:  ${SCHEDULED_COUNT}"
          echo "==========================================="

          if [[ "$SCHEDULED_COUNT" -gt 0 ]]; then
            echo ""
            echo "Findings:"
            while IFS='|' read -r user repo path state wf_id name; do
              echo "  • ${user} / ${repo} — ${path} [${state}]"
            done < "$WARNINGS_FILE"
          fi

          # ── Persist for summary and email steps ──
          cp "$WARNINGS_FILE" "${RUNNER_TEMP}/warnings.txt"
          cp "$EMAIL_MAP_FILE" "${RUNNER_TEMP}/email_map.txt"

          # ── Set outputs ──
          {
            echo "total_repos=${TOTAL_REPOS}"
            echo "total_forks=${TOTAL_FORKS}"
            echo "scheduled_count=${SCHEDULED_COUNT}"
          } >> "$GITHUB_OUTPUT"

          # ── Fail the workflow if scheduled workflows were found ──
          if [[ "$SCHEDULED_COUNT" -gt 0 ]]; then
            echo "::warning::Found ${SCHEDULED_COUNT} scheduled workflow(s) in forked repos."
          fi

      - name: Generate job summary
        if: always()
        run: |
          set -euo pipefail

          WARNINGS_FILE="${RUNNER_TEMP}/warnings.txt"
          EXCLUDE_WORKFLOWS="${{ vars.EXCLUDE_WORKFLOWS }}"

          TOTAL_REPOS="${{ steps.scan.outputs.total_repos }}"
          TOTAL_FORKS="${{ steps.scan.outputs.total_forks }}"
          SCHEDULED_COUNT="${{ steps.scan.outputs.scheduled_count }}"

          {
            echo "# 🔍 Fork Scheduled-Workflow Monitor"
            echo ""

            if [[ "${SCHEDULED_COUNT:-0}" -gt 0 ]]; then
              echo "> **🚨 ${SCHEDULED_COUNT} scheduled workflow(s) found in forked repos!**"
            else
              echo "> **✅ No scheduled workflows detected in any fork.**"
            fi

            echo ""
            echo "## 📊 Statistics"
            echo ""
            echo "| Metric | Count |"
            echo "|:-------|------:|"
            echo "| Total repos scanned | ${TOTAL_REPOS:-0} |"
            echo "| Forked repos checked | ${TOTAL_FORKS:-0} |"
            echo "| Scheduled workflows found | ${SCHEDULED_COUNT:-0} |"
            echo ""

            # Show excluded workflows if any
            if [[ -n "$EXCLUDE_WORKFLOWS" ]]; then
              echo "## ⏭️ Excluded Workflows"
              echo ""
              echo "The following workflow files are excluded from scanning:"
              echo ""
              IFS=',' read -ra EXCLUDED_LIST <<< "$EXCLUDE_WORKFLOWS"
              for excluded in "${EXCLUDED_LIST[@]}"; do
                excluded=$(echo "$excluded" | xargs)
                [[ -n "$excluded" ]] && echo "- \`${excluded}\`"
              done
              echo ""
            fi

            if [[ -s "$WARNINGS_FILE" ]]; then
              echo "## 🚨 Active Scheduled Workflows Found"
              echo ""

              # Get unique usernames preserving order
              users_ordered=$(awk -F'|' '!seen[$1]++ { print $1 }' "$WARNINGS_FILE")

              while IFS= read -r current_user; do
                [[ -z "$current_user" ]] && continue
                user_count=$(grep -c "^${current_user}|" "$WARNINGS_FILE")

                echo "### 👤 ${current_user} (${user_count} workflow(s))"
                echo ""
                echo "| Repository | Workflow File | State | Action |"
                echo "|:-----------|:-------------|:------|:-------|"

                grep "^${current_user}|" "$WARNINGS_FILE" | while IFS='|' read -r user repo path state wf_id name; do
                  repo_link="[${repo}](https://github.com/${repo})"
                  disable_link="[Disable](https://github.com/${repo}/actions/workflows/${path##*/})"

                  echo "| ${repo_link} | \`${path##*/}\` | \`${state}\` | ${disable_link} |"
                done

                echo ""
              done <<< "$users_ordered"
            fi

            echo "---"
            echo "*🤖 Automated by [Monitor Fork Scheduled Workflows]"
            echo "(${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})*"

          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate per-user email HTML files
        if: always() && steps.scan.outputs.scheduled_count > 0
        # if: false # Temporarily disabled
        id: emails
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const warningsPath = `${process.env.RUNNER_TEMP}/warnings.txt`;
            const emailMapPath = `${process.env.RUNNER_TEMP}/email_map.txt`;

            if (!fs.existsSync(warningsPath) || fs.statSync(warningsPath).size === 0) {
              core.info('No warnings — no emails to generate.');
              core.setOutput('user_emails_json', '[]');
              return;
            }

            // Parse email map: username -> email
            const emailMap = {};
            fs.readFileSync(emailMapPath, 'utf8').trim().split('\n').forEach(line => {
              const [username, email] = line.split('|');
              if (username && email) emailMap[username.trim()] = email.trim();
            });

            // Parse warnings: username|repo|path|state|wf_id|name
            const warnings = fs.readFileSync(warningsPath, 'utf8').trim().split('\n').map(line => {
              const [username, repo, path, state, wfId, name] = line.split('|');
              return { username, repo, path, state, wfId, name };
            });

            // Group warnings by username
            const grouped = {};
            for (const w of warnings) {
              if (!grouped[w.username]) grouped[w.username] = [];
              grouped[w.username].push(w);
            }

            const userEmails = [];

            for (const [username, userWarnings] of Object.entries(grouped)) {
              const email = emailMap[username];
              if (!email) {
                core.warning(`No email found for user '${username}' — skipping notification.`);
                continue;
              }

              const count = userWarnings.length;
              const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;

              let rows = '';
              let rowIndex = 0;
              for (const w of userWarnings) {
                const wfFile = w.path.split('/').pop();
                const disableUrl = `https://github.com/${w.repo}/actions/workflows/${wfFile}`;
                const bgColor = rowIndex % 2 === 0 ? '#ffffff' : '#faf9f8';
                const borderStyle = rowIndex < userWarnings.length - 1 ? 'border-bottom:1px solid #f3f2f1;' : '';
                rows += `
                  <tr style="background-color:${bgColor};">
                    <td style="padding:10px 12px; font-size:13px; ${borderStyle}">
                      <a href="https://github.com/${w.repo}" style="color:#0078d4; text-decoration:none;">${w.repo}</a>
                    </td>
                    <td style="padding:10px 12px; font-size:13px; ${borderStyle} color:#323130;">${w.name}</td>
                    <td style="padding:10px 12px; font-size:13px; ${borderStyle} color:#605e5c;"><code style="background:#f3f2f1; padding:2px 6px; border-radius:3px; font-size:12px;">${wfFile}</code></td>
                    <td style="padding:10px 12px; font-size:13px; ${borderStyle} text-align:center; color:#323130;">Active</td>
                    <td style="padding:10px 12px; font-size:13px; ${borderStyle} text-align:center;">
                      <a href="${disableUrl}" style="display:inline-block; color:#d13438; text-decoration:none; font-weight:600; font-size:12px; padding:4px 14px; border:1px solid #d13438; border-radius:4px;">Disable</a>
                    </td>
                  </tr>`;
                rowIndex++;
              }

              const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: '2-digit' });

              const html = `<!DOCTYPE html>
              <html>
              <head><meta charset="utf-8"></head>
              <body style="margin:0; padding:0; background-color:#f0f2f5; font-family:'Segoe UI',Roboto,Arial,sans-serif;">
                <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f0f2f5; padding:24px 0;">
                  <tr><td align="center">
                    <table width="720" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:4px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                      <tr>
                        <td style="background-color:#0078d4; padding:20px 32px;">
                          <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                              <td>
                                <p style="margin:0; font-size:20px; font-weight:700; color:#ffffff;">Active Scheduled Workflows — Action Required</p>
                                <p style="margin:6px 0 0; font-size:13px; color:#b3d7f2;">${username} &bull; ${today}</p>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                      <tr>
                        <td style="padding:16px 32px 8px;">
                          <p style="margin:0; font-size:14px; color:#323130;">Hi <strong>${username}</strong>,</p>
                          <p style="margin:8px 0 0; font-size:14px; color:#605e5c;">The automated scan found <strong>${count}</strong> active scheduled workflow(s) in your forked repositories that require your attention:</p>
                        </td>
                      </tr>
                      <tr>
                        <td style="padding:12px 32px 24px;">
                          <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #edebe9; border-radius:4px; overflow:hidden;">
                            <tr style="background-color:#faf9f8;">
                              <th style="padding:10px 12px; text-align:left; font-size:12px; font-weight:600; color:#323130; border-bottom:2px solid #0078d4;">Repository</th>
                              <th style="padding:10px 12px; text-align:left; font-size:12px; font-weight:600; color:#323130; border-bottom:2px solid #0078d4;">Workflow</th>
                              <th style="padding:10px 12px; text-align:left; font-size:12px; font-weight:600; color:#323130; border-bottom:2px solid #0078d4;">File</th>
                              <th style="padding:10px 12px; text-align:center; font-size:12px; font-weight:600; color:#323130; border-bottom:2px solid #0078d4;">State</th>
                              <th style="padding:10px 12px; text-align:center; font-size:12px; font-weight:600; color:#323130; border-bottom:2px solid #0078d4;">Action</th>
                            </tr>
                            ${rows}
                          </table>
                        </td>
                      </tr>
                      <tr>
                        <td style="padding:0 32px 24px;">
                          <p style="margin:0; font-size:13px; color:#605e5c;">Please disable these scheduled workflows to avoid unnecessary GitHub Actions usage on forked repos.</p>
                        </td>
                      </tr>
                      <tr>
                        <td style="background-color:#faf9f8; padding:16px 32px; border-top:1px solid #edebe9;">
                          <p style="margin:0; font-size:12px; color:#a19f9d; text-align:center;">
                            Automated Fork Scheduled-Workflow Monitor &bull;
                            <a href="${runUrl}" style="color:#0078d4; text-decoration:none;">View Scan Report</a>
                          </p>
                        </td>
                      </tr>
                    </table>
                  </td></tr>
                </table>
              </body>
              </html>`;

              const safeUser = username.replace(/[^a-zA-Z0-9_-]/g, '_');
              const filePath = `email-${safeUser}.html`;
              fs.writeFileSync(filePath, html);

              const subject = `[Action Required] ${count} Active Scheduled Workflow(s) Found in Your Fork Repos`;

              userEmails.push({ username, email, subject, file: filePath });
              core.info(`Generated email for ${username} -> ${email} (${count} workflows)`);
            }

            core.setOutput('user_emails_json', JSON.stringify(userEmails));

      - name: Send per-user email via Logic App
        if: always() && steps.scan.outputs.scheduled_count > 0
        # if: false # Temporarily disabled
        shell: bash
        env:
          LOGICAPP_URL: ${{ secrets.FORK_EMAILNOTIFICATION_LOGICAPP_URL }}
          USER_EMAILS_JSON: ${{ steps.emails.outputs.user_emails_json }}
        run: |
          set -euo pipefail

          if [[ -z "$USER_EMAILS_JSON" || "$USER_EMAILS_JSON" == "[]" ]]; then
            echo "No emails to send."
            exit 0
          fi

          echo "$USER_EMAILS_JSON" | jq -c '.[]' | while IFS= read -r entry; do
            username=$(echo "$entry" | jq -r '.username')
            email=$(echo "$entry" | jq -r '.email')
            subject=$(echo "$entry" | jq -r '.subject')
            file=$(echo "$entry" | jq -r '.file')

            echo "📧 Sending email to ${email} for ${username}..."

            EMAIL_HTML=$(cat "$file" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

            EMAIL_BODY=$(cat <<EOF
          {
            "to": "${email}",
            "subject": "${subject}",
            "body": ${EMAIL_HTML}
          }
          EOF
          )

            curl -X POST "${LOGICAPP_URL}" \
              -H "Content-Type: application/json" \
              -d "$EMAIL_BODY" \
              && echo "  ✅ Email sent to ${email}" \
              || echo "::warning::Failed to send email to ${email}"
          done
